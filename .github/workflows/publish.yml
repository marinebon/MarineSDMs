on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: macOS-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true  # for pdf
        env:
          # authenticate Quarto's tinytex installer against the GitHub API
          # to avoid 403 rate-limiting on rstudio/tinytex-releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # From https://github.com/rspatial/terra/blob/master/.github/workflows/pkgdown.yml
      # - name: Install spatial dependencies
      #   run: brew install gdal proj
      #
      # From https://github.com/actions/setup-python
      # - name: Setup Python
      #   uses: actions/setup-python@v3

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          # match renv.lock (R 4.3.2 / Bioconductor 3.18); newer R has no
          # binaries for these pinned packages and some fail to compile
          r-version: '4.3.2'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
        env:
          # authenticate GitHub package downloads (e.g. debruine/glossary)
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

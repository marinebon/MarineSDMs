on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    # ubuntu pulls Posit Package Manager binaries for the exact pinned
    # versions in renv.lock (no source compilation, unlike the macOS runner)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true  # for pdf
        env:
          # authenticate Quarto's tinytex installer against the GitHub API
          # to avoid 403 rate-limiting on rstudio/tinytex-releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        # runtime/build libs for svglite, systemfonts, curl, openssl, xml2
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libpng-dev libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libfribidi-dev libjpeg-dev libtiff5-dev

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          # match renv.lock (R 4.3.2); use-public-rspm enables binary packages
          r-version: '4.3.2'
          use-public-rspm: true

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
        env:
          # authenticate GitHub package downloads (e.g. debruine/glossary)
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
